name: Selenium CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-smoke-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Selenium smoke tests on Chrome
        run: mvn -f kimlien/SeleniumFramework/pom.xml clean test "-Dbrowser=chrome" "-Denv=dev" "-DsuiteXmlFile=src/test/resources/testng-smoke.xml"

      - name: Upload artifacts when test fails
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-test-artifacts
          path: |
            kimlien/SeleniumFramework/target/surefire-reports/
            kimlien/SeleniumFramework/target/screenshots/