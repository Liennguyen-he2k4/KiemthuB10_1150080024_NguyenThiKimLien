name: Selenium CI

on:
  push:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox]

    defaults:
      run:
        working-directory: kimlien/SeleniumFramework

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install Firefox
        uses: browser-actions/setup-firefox@v1

      - name: Verify GitHub secret masking
        env:
          APP_PASSWORD: ${{ secrets.SAUCEDEMO_PASSWORD }}
        run: echo $APP_PASSWORD

      - name: Run tests on ${{ matrix.browser }}
        env:
          SAUCEDEMO_USERNAME: ${{ secrets.SAUCEDEMO_USERNAME }}
          SAUCEDEMO_PASSWORD: ${{ secrets.SAUCEDEMO_PASSWORD }}
        run: mvn clean test "-DsuiteXmlFile=src/test/resources/testng-smoke.xml" "-Dbrowser=${{ matrix.browser }}" "-Denv=dev"

      - name: Upload results ${{ matrix.browser }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser }}
          path: kimlien/SeleniumFramework/target/surefire-reports/